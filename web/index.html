<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#C8DFF5" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sleep Diaries" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- iPhone/iPad splash screens -->
    <link rel="apple-touch-startup-image" href="/splashscreens/iphone_15_pro_max.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splashscreens/iphone_15_pro.png"     media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splashscreens/iphone_14_plus.png"    media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splashscreens/iphone_14.png"         media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splashscreens/iphone_x.png"          media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splashscreens/iphone_8.png"          media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/splashscreens/iphone_se.png"         media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/splashscreens/ipad_pro_12_9.png"     media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/splashscreens/ipad_pro_11.png"       media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/splashscreens/ipad_mini.png"         media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)" />

    <title>Sleep Diaries</title>
    <meta name="description" content="🌙 Open-source sleep diary app for clinical research — built with React Native &amp; Expo. Morning &amp; evening questionnaires, sleep metrics, and data export (CSV/JSON)." />

    <!-- Open Graph -->
    <meta property="og:title" content="Sleep Diaries" />
    <meta property="og:description" content="🌙 Open-source sleep diary app for clinical research — built with React Native &amp; Expo. Morning &amp; evening questionnaires, sleep metrics, and data export (CSV/JSON)." />
    <meta property="og:image" content="https://sleepdiaries.circadia-lab.uk/social.png" />
    <meta property="og:url" content="https://sleepdiaries.circadia-lab.uk" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sleep Diaries" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sleep Diaries" />
    <meta name="twitter:description" content="🌙 Open-source sleep diary app for clinical research — built with React Native &amp; Expo. Morning &amp; evening questionnaires, sleep metrics, and data export (CSV/JSON)." />
    <meta name="twitter:image" content="https://sleepdiaries.circadia-lab.uk/social.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        background-color: #1A3A5C;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 24px 0;
        overflow-y: auto;
      }

      #root {
        width: 390px;
        max-width: 390px;
        min-height: 844px;
        height: auto;
        position: relative;
        overflow: hidden;
        border-radius: 44px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        flex-shrink: 0;
        contain: layout;
      }

      /* On mobile screens, fill the full viewport */
      @media (max-width: 430px) {
        html, body {
          background-color: transparent;
          padding: 0;
          align-items: stretch;
        }
        #root {
          width: 100vw;
          min-height: 100vh;
          border-radius: 0;
          box-shadow: none;
        }
      }
    </style>
    <script>
      // Clamp Dimensions.get('window').width to 390px on desktop web
      // so React Native components using Dimensions behave as if on a phone.
      if (typeof window !== 'undefined' && window.innerWidth > 430) {
        const PHONE_W = 390;
        const PHONE_H = 844;
        const isStandalone = window.navigator.standalone === true;
        // On desktop browser only: clamp to phone frame dimensions
        if (!isStandalone) {
          Object.defineProperty(window, '__phoneWidth',  { value: PHONE_W });
          Object.defineProperty(window, '__phoneHeight', { value: PHONE_H });
          try {
            Object.defineProperty(window, 'innerWidth',  { get: () => PHONE_W, configurable: true });
            Object.defineProperty(window, 'innerHeight', { get: () => PHONE_H, configurable: true });
          } catch(e) {}
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
